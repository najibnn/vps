name: SSH via ngrok (Stable)

on: [workflow_dispatch]

jobs:
  ssh:
    runs-on: ubuntu-latest
    steps:
      - name: Install SSH server
        run: |
          sudo apt update
          sudo apt install openssh-server wget tar jq -y
          sudo mkdir -p /var/run/sshd

          # ضبط كلمة مرور مؤقتة
          echo "ubuntu:123456" | sudo chpasswd

          # السماح بالاتصال بكلمة مرور
          sudo sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo sed -i 's/PermitRootLogin prohibit-password/PermitRootLogin yes/' /etc/ssh/sshd_config

          # تشغيل SSH
          sudo systemctl enable ssh
          sudo systemctl restart ssh

      - name: Install latest ngrok v3
        run: |
          wget https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-linux-amd64.tgz
          tar -xvzf ngrok-v3-stable-linux-amd64.tgz
          sudo mv ngrok /usr/local/bin/ngrok
          ngrok version

      - name: Configure ngrok and start TCP tunnel
        run: |
          ngrok config add-authtoken ${{ secrets.NGROK_AUTH }}
          nohup ngrok tcp 22 --log=stdout --log-format=json > ngrok_ssh.log &

      - name: Wait for ngrok TCP URL and display
        run: |
          echo "Waiting for ngrok SSH URL..."
          for i in {1..30}; do
            URL=$(jq -r 'select(.lvl=="info") | .url | select(. != null) | select(test("^tcp://"))' ngrok_ssh.log | head -n1)
            if [ ! -z "$URL" ]; then
              HOST=$(echo $URL | cut -d/ -f3 | cut -d: -f1)
              PORT=$(echo $URL | cut -d: -f3)
              echo "SSH is ready!"
              echo "Connect using this command:"
              echo "ssh ubuntu@$HOST -p $PORT"
              echo "Password: 123456"
              exit 0
            fi
            sleep 2
          done
          echo "Failed to get ngrok SSH URL. Check ngrok logs."
